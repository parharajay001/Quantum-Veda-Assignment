# Local development services. Runs PostgreSQL only — apps run on the host
# via `pnpm dev`. Credentials must match the DATABASE_URL in the .env.example
# files (packages/database, apps/server).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
